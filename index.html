<section id="simulador-interactivo" style="padding: 60px 20px; background: linear-gradient(180deg, #0F172A 0%, #1E293B 100%); font-family: 'Inter', sans-serif; border-top: 1px solid rgba(255,255,255,0.1); margin: 40px 0; border-radius: 24px;">
    <div style="max-width: 850px; margin: 0 auto; background: rgba(30, 41, 59, 0.7); border-radius: 24px; padding: 40px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
        
        <div style="text-align: center; margin-bottom: 35px;">
            <h2 style="color: #4ADE80; font-size: 32px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em;">Prueba el Simulador</h2>
            <p style="color: #CBD5E1; font-size: 17px; line-height: 1.6;">Configura tu patrón y mira cómo CustodiApp organiza tu año en un segundo.</p>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px;">
            <div style="background: rgba(15, 23, 42, 0.5); padding: 20px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05);">
                <label style="display: block; font-size: 11px; font-weight: 700; color: #4ADE80; margin-bottom: 10px; text-transform: uppercase;">Tu tipo de custodia</label>
                <select id="tipoCustodia" onchange="simularCustodia()" style="width: 100%; padding: 12px; border-radius: 8px; background: #1E293B; color: white; border: 1px solid #334155; font-size: 15px; cursor: pointer; outline: none;">
                    <option value="semanas">Semanas Alternas</option>
                    <option value="223">Patrón 2-2-3</option>
                    <option value="findes">Solo Fines de Semana</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; justify-content: center;">
                <div style="text-align: center;">
                    <span style="display: block; font-size: 24px; font-weight: 800; color: white;">Solo 2,99€</span>
                    <span style="font-size: 12px; color: #94A3B8;">Pago único · Sin suscripciones</span>
                </div>
            </div>
        </div>

        <div style="background: white; border-radius: 16px; padding: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);">
            <div id="gridCalendario" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;"></div>
        </div>

        <div style="margin-top: 40px; text-align: center;">
            <a href="https://play.google.com/store/apps/details?id=com.custodiapp.app" style="display: inline-block; padding: 20px 50px; background: #4ADE80; color: #0F172A; text-decoration: none; border-radius: 14px; font-weight: 800; font-size: 18px; box-shadow: 0 10px 20px rgba(74, 222, 128, 0.2);">
                DESCARGAR EN GOOGLE PLAY
            </a>
        </div>
    </div>

    <div style="text-align: center; margin-top: 60px; padding: 40px; background: rgba(255,255,255,0.03); border-radius: 24px; max-width: 850px; margin-left: auto; margin-right: auto;">
        <h3 style="margin-bottom: 25px; color: white;">¿Nos ves desde el ordenador? Escanea para descargar directo</h3>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://play.google.com/store/apps/details?id=com.custodiapp.app" alt="QR Google Play" style="border: 10px solid white; border-radius: 20px; margin-bottom: 20px;" width="250" height="250">
        <div style="margin-top: 10px;">
            <p style="font-weight: bold; margin-bottom: 5px; color: white;">Ya disponible en Google Play</p>
        </div>
    </div>

    <script>
        function simularCustodia() {
            const container = document.getElementById('gridCalendario');
            const tipo = document.getElementById('tipoCustodia').value;
            container.innerHTML = '';

            const dias = ['L', 'M', 'X', 'J', 'V', 'S', 'D'];
            dias.forEach(d => {
                container.innerHTML += `<div style="font-size: 11px; font-weight: 800; color: #94A3B8; text-align: center; padding-bottom: 10px;">${d}</div>`;
            });

            for (let i = 1; i <= 28; i++) {
                let color;
                if (tipo === 'semanas') {
                    color = (i <= 7 || (i > 14 && i <= 21)) ? '#4ADE80' : '#60A5FA';
                } else if (tipo === '223') {
                    const mod = i % 7;
                    color = (mod === 1 || mod === 2 || mod === 5 || mod === 6) ? '#4ADE80' : '#60A5FA';
                } else {
                    color = (i % 7 === 6 || i % 7 === 0) ? '#4ADE80' : '#E2E8F0';
                }

                container.innerHTML += `
                    <div style="background: ${color}; color: ${color === '#E2E8F0' ? '#94A3B8' : 'white'}; padding: 10px 0; border-radius: 6px; font-weight: 700; font-size: 13px; text-align: center;">
                        ${i}
                    </div>`;
            }
        }
        simularCustodia();
    </script>
</section>
